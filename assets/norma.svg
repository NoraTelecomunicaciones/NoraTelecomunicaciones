<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e9c8a"/>
      <stop offset="1" stop-color="#0a6f63"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="240" height="240" rx="48" fill="url(#bg)"/>
  <!-- server rack -->
  <g fill="#ffffff">
    <rect x="74" y="58" width="108" height="40" rx="8" opacity="0.95"/>
    <rect x="74" y="108" width="108" height="40" rx="8" opacity="0.95"/>
    <rect x="74" y="158" width="108" height="40" rx="8" opacity="0.95"/>
  </g>
  <!-- status leds -->
  <circle cx="92" cy="78"  r="6" fill="#28e07b"/>
  <circle cx="92" cy="128" r="6" fill="#28e07b"/>
  <circle cx="92" cy="178" r="6" fill="#28e07b"/>
  <!-- rack vents -->
  <g stroke="#0a6f63" stroke-width="5" stroke-linecap="round">
    <line x1="118" y1="78"  x2="166" y2="78"/>
    <line x1="118" y1="128" x2="166" y2="128"/>
    <line x1="118" y1="178" x2="166" y2="178"/>
  </g>
  <!-- ssh link badge -->
  <circle cx="186" cy="186" r="34" fill="#0a6f63" stroke="#ffffff" stroke-width="6"/>
  <g fill="#ffffff" font-family="monospace" font-weight="700" font-size="22" text-anchor="middle">
    <text x="186" y="194">&gt;_</text>
  </g>
</svg>
